<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Qadam - Telegram Mini App v2.5</title>

    <!-- Brauzer eski keshni ishlatmasligi uchun -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --btn-color: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --danger-color: #ff3b30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            min-width: 220px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        [data-theme="dark"] .hud {
            background: rgba(30, 30, 30, 0.85);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.1);
        }

        .hud-value {
            font-size: 38px;
            font-weight: 800;
            background: linear-gradient(135deg, #00C6FF, #0072FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2px;
            line-height: 1.1;
        }

        [data-theme="dark"] .hud-value {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hud-label {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--hint-color);
        }

        .hud-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 13px;
            font-weight: 600;
            border-top: 1px solid rgba(150, 150, 150, 0.3);
            padding-top: 8px;
            gap: 10px;
        }

        #map {
            flex-grow: 1;
            width: 100%;
            z-index: 1;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 0 20px;
        }

        .btn {
            flex: 1;
            max-width: 250px;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-start {
            background-color: var(--btn-color);
            color: var(--btn-text);
        }

        .btn-stop {
            background-color: var(--danger-color);
            color: white;
            display: none;
        }

        .status-pill {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.65);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }

        .status-pill.visible {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div
        style="position: absolute; top: 10px; right: 15px; z-index: 9999; font-size: 14px; font-weight: 800; color: #ff3b30; text-shadow: 0px 0px 3px white;">
        v2.5</div>

    <div class="hud">
        <div class="hud-value" id="stepCount">0</div>
        <div class="hud-label">Qadam</div>
        <div class="hud-stats">
            <span id="distanceDisplay">0.0 m</span>
            <span id="areaDisplay">0 m²</span>
        </div>
    </div>

    <div id="map"></div>
    <div class="status-pill" id="statusPill">Kirish...</div>

    <div class="controls">
        <button class="btn btn-start" id="startBtn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            Boshlash
        </button>
        <button class="btn btn-stop" id="stopBtn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <rect x="6" y="6" width="12" height="12"></rect>
            </svg>
            To'xtatish
        </button>
    </div>

    <!-- MAIN SCRIPT -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const tg = window.Telegram?.WebApp || {
                expand: () => { },
                ready: () => { },
                colorScheme: 'light',
                initDataUnsafe: {},
                showAlert: (msg) => alert(msg),
                showPopup: (opts) => alert(opts.message),
                HapticFeedback: null
            };
            tg.expand();
            tg.ready();

            const tgUser = tg.initDataUnsafe?.user || { id: 111111, first_name: "Mehmon", username: "mehmon" };
            if (tg.colorScheme === 'dark') document.body.setAttribute('data-theme', 'dark');

            const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([41.311081, 69.240562], 13);
            L.control.attribution({ position: 'bottomright' }).addTo(map);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OSMap' }).addTo(map);

            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const stepCountEl = document.getElementById('stepCount');
            const distanceEl = document.getElementById('distanceDisplay');
            const areaEl = document.getElementById('areaDisplay');
            const statusPill = document.getElementById('statusPill');

            let isTracking = false;
            let watchId = null;
            let pathLatLngs = [];
            let totalDistance = 0;
            let totalArea = 0;
            let polyline = null;
            let currentPositionMarker = null;
            let polygons = [];

            let lastTimestamp = null;
            let inactivityTimer = null;

            let stepCount = 0;
            let lastMagnitude = 0;
            let lastStepTime = 0;
            let motionMode = false; // true = akselerometr, false = GPS

            // ASOSIY OLDINGI LOGIKA CONSTANTAlari
            const INACTIVITY_LIMIT_MS = 10 * 60 * 1000;
            const SPEED_LIMIT_MPS = 4.0; // (14km/h gacha)
            const POLYGON_CLOSE_DIST = 15;
            // Keng qadam o'rniga chaqqonroq (0.6 metrdan 1 qadam) deb olamiz
            const STEP_LENGTH_METERS = 0.6;
            // 0.5 metrlik eng sezgir GPS masofa qo'yildi - bu uydagi eng kichik yurishlarni ham sanaydi (Garchi ba'zida joyida ozgina qaltirab tursa ham qadam sanaydi lekin juda sezgir!)
            const MIN_DISTANCE_ACCURACY = 0.5;

            const userIcon = L.divIcon({
                className: 'custom-user-marker',
                html: '<div style="width: 18px; height: 18px; background-color: var(--btn-color); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.4);"></div>',
                iconSize: [24, 24], iconAnchor: [12, 12]
            });

            function showStatus(msg, timeout = 3000) {
                statusPill.textContent = msg;
                statusPill.classList.add('visible');

                let captureMsg = msg;
                setTimeout(() => {
                    if (!isTracking) {
                        statusPill.classList.remove('visible');
                    } else if (statusPill.textContent === captureMsg) {
                        statusPill.classList.remove('visible');
                    }
                }, timeout);
            }

            // SUPABASE BO'LIMI
            let supabase = null;
            try {
                if (window.supabase) {
                    const SUPABASE_URL = 'https://qxncsdivkowkgydtjokr.supabase.co';
                    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4bmNzZGl2a293a2d5ZHRqb2tyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MTAwOTYsImV4cCI6MjA5MDQ4NjA5Nn0.NtAgZcAlQgvsMSMe325n0AW8-Cmz31KD-OGJUFmvhGo';
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                } else {
                    console.warn("Supabase CDN ulanmadi! O'yin avtonom rejimda.");
                    showStatus("Offline rejim", 3000);
                }
            } catch (err) {
                console.error("Supabase Client xatosi:", err);
                supabase = null;
            }

            async function initGameSystem() {
                if (!supabase) return;
                try {
                    const { error: userError } = await supabase
                        .from('users')
                        .upsert({
                            telegram_id: tgUser.id,
                            first_name: tgUser.first_name || '',
                            username: tgUser.username || ''
                        }, { onConflict: 'telegram_id' });

                    await loadAllTerritories();

                    supabase
                        .channel('public:territories')
                        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'territories' }, payload => {
                            try {
                                const newTerritory = payload.new;
                                if (newTerritory.user_id !== tgUser.id) {
                                    drawTerritoryPolygon(newTerritory.polygon_coords, newTerritory.user_id);
                                }
                            } catch (evtErr) { }
                        })
                        .subscribe();

                    showStatus("Tizimga ulandi!", 2000);
                } catch (e) {
                    console.error("initGameSystem xatosi.", e);
                }
            }

            async function loadAllTerritories() {
                if (!supabase) return;
                try {
                    const { data, error } = await supabase.from('territories').select('*');
                    if (data) {
                        let myArea = 0;
                        data.forEach(territory => {
                            drawTerritoryPolygon(territory.polygon_coords, territory.user_id);
                            if (territory.user_id === tgUser.id) {
                                myArea += (territory.area_sqm || 0);
                            }
                        });
                        totalArea = myArea;
                        updateStats();
                    }
                } catch (e) { }
            }

            async function saveStatsToSupabase(steps, dist) {
                if (!supabase || steps === 0) return;
                try {
                    await supabase.from('steps_stats').insert({
                        user_id: tgUser.id,
                        steps: steps,
                        distance_meters: dist,
                        date: new Date().toISOString()
                    });
                } catch (e) { }
            }

            async function saveTerritoryToSupabase(coords, area) {
                if (!supabase) return;
                try {
                    await supabase.from('territories').insert({
                        user_id: tgUser.id,
                        polygon_coords: coords,
                        area_sqm: area
                    });
                } catch (e) { }
            }

            function drawTerritoryPolygon(coords, ownerId) {
                if (!coords || coords.length === 0) return;
                try {
                    const latLngs = coords.map(c => [c.lat, c.lng]);
                    const isMine = ownerId === tgUser.id;
                    const color = isMine ? 'var(--btn-color, #2481cc)' : '#808080';

                    const poly = L.polygon(latLngs, {
                        color: color,
                        fillColor: color,
                        fillOpacity: isMine ? 0.4 : 0.3,
                        weight: 2
                    }).addTo(map);
                    polygons.push(poly);
                } catch (e) { }
            }

            initGameSystem();

            function getGeodesicArea(latLngs) {
                let area = 0;
                const d2r = Math.PI / 180;
                if (latLngs.length > 2) {
                    for (let i = 0; i < latLngs.length; i++) {
                        let p1 = latLngs[i];
                        let p2 = latLngs[(i + 1) % latLngs.length];
                        area += ((p2.lng - p1.lng) * d2r) * (2 + Math.sin(p1.lat * d2r) + Math.sin(p2.lat * d2r));
                    }
                    area = area * 6378137.0 * 6378137.0 / 2.0;
                }
                return Math.abs(area);
            }

            function resetInactivityTimer() {
                if (inactivityTimer) clearTimeout(inactivityTimer);
                inactivityTimer = setTimeout(() => {
                    if (isTracking) {
                        stopTracking(true);
                    }
                }, INACTIVITY_LIMIT_MS);
            }

            function handlePolygonClosure() {
                const area = getGeodesicArea(pathLatLngs);
                totalArea += area;

                const jsonCoords = pathLatLngs.map(p => ({ lat: p.lat, lng: p.lng }));

                drawTerritoryPolygon(jsonCoords, tgUser.id);
                saveTerritoryToSupabase(jsonCoords, area);

                if (tg.HapticFeedback && typeof tg.HapticFeedback.notificationOccurred === 'function') {
                    try { tg.HapticFeedback.notificationOccurred('success'); } catch (e) { }
                }

                tg.showPopup({
                    title: "Hudud egallandi!",
                    message: `Siz ${area.toFixed(1)} kv.m maydonni yopdingiz!`,
                    buttons: [{ type: "close" }]
                });

                if (polyline) map.removeLayer(polyline);
                pathLatLngs = [];
                polyline = L.polyline([], { color: 'var(--btn-color, #2481cc)', weight: 6, opacity: 0.8, lineJoin: 'round', lineCap: 'round' }).addTo(map);
                updateStats();
            }

            function handleMotion(event) {
                if (!isTracking) return;
                const acc = event.accelerationIncludingGravity;
                if (!acc || acc.x === null) return;
                const magnitude = Math.sqrt(acc.x ** 2 + acc.y ** 2 + acc.z ** 2);
                const delta = Math.abs(magnitude - lastMagnitude);
                lastMagnitude = magnitude;
                const now = Date.now();
                if (delta > 12 && (now - lastStepTime) > 300) {
                    stepCount++;
                    lastStepTime = now;
                    updateStats();
                    resetInactivityTimer();
                }
            }

            // ESKI QADAM METODIGA O'TISH - GPS ORQALI! TO'XTATISH TUGMASI HIMOYA OSTIDA!
            function stopTracking(dueToInactivity = false) {
                try {
                    isTracking = false;
                    startBtn.style.display = 'flex';
                    stopBtn.style.display = 'none';
                    statusPill.classList.remove('visible');

                    if (inactivityTimer) clearTimeout(inactivityTimer);

                    if (watchId !== null) {
                        navigator.geolocation.clearWatch(watchId);
                        watchId = null;
                    }

                    let finalSteps = motionMode ? stepCount : Math.floor(totalDistance / STEP_LENGTH_METERS);
                    saveStatsToSupabase(finalSteps, totalDistance);

                    stepCount = 0;
                    window.removeEventListener('devicemotion', handleMotion);
                    motionMode = false;

                    if (dueToInactivity) {
                        try { tg.showAlert("10 daqiqa harakatsiz bo'lganligi sababli o'yin avtomatik to'xtatildi."); } catch (e) { }
                    } else {
                        if (tg.HapticFeedback && typeof tg.HapticFeedback.notificationOccurred === 'function') {
                            try { tg.HapticFeedback.notificationOccurred('success'); } catch (e) { }
                        }

                        try {
                            tg.showPopup({
                                title: "O'yin to'xtatildi",
                                message: `Siz ${finalSteps} qadam yurdingiz.\nMasofa: ${totalDistance < 1000 ? totalDistance.toFixed(1) + ' m' : (totalDistance / 1000).toFixed(2) + ' km'}\nMaydon: ${totalArea.toFixed(1)} m²`,
                                buttons: [{ type: "close" }]
                            });
                        } catch (e) {
                            alert(`O'yin to'xtatildi!\nQadam: ${finalSteps}\nMasofa: ${totalDistance < 1000 ? totalDistance.toFixed(1) + ' m' : (totalDistance / 1000).toFixed(2) + ' km'}`);
                        }
                    }

                    if (polyline) map.removeLayer(polyline);
                    pathLatLngs = [];
                } catch (err) {
                    console.error("To'xtatish xatoligi:", err);
                    try { tg.showAlert("To'xtatishda xato: " + err.message); } catch (ex) { }
                }
            }

            try {
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        map.setView([pos.coords.latitude, pos.coords.longitude], 16);
                        currentPositionMarker = L.marker([pos.coords.latitude, pos.coords.longitude], { icon: userIcon, zIndexOffset: 1000 }).addTo(map);
                    }, () => { }, { enableHighAccuracy: true });
                }
            } catch (ignoreErr) { }

            stopBtn.addEventListener('click', () => stopTracking(false));

            startBtn.addEventListener('click', async () => {
                if (!("geolocation" in navigator)) {
                    tg.showAlert("Qurilmangizda GPS yo'q.");
                    return;
                }

                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    try {
                        const permission = await DeviceMotionEvent.requestPermission();
                        if (permission === 'granted') {
                            window.addEventListener('devicemotion', handleMotion);
                            motionMode = true;
                            showStatus("📱 Sensor orqali ishlamoqda", 3000);
                        } else {
                            motionMode = false;
                            showStatus("🛰 GPS orqali ishlamoqda", 3000);
                        }
                    } catch (e) {
                        motionMode = false;
                    }
                } else if (typeof DeviceMotionEvent !== 'undefined') {
                    window.addEventListener('devicemotion', handleMotion);
                    motionMode = true;
                    showStatus("📱 Sensor orqali ishlamoqda", 3000);
                } else {
                    motionMode = false;
                    showStatus("🛰 GPS orqali ishlamoqda", 3000);
                }

                isTracking = true;
                startBtn.style.display = 'none';
                stopBtn.style.display = 'flex';

                if (!motionMode) showStatus("GPS Qadam hisoblamoqda...");

                if (polyline) map.removeLayer(polyline);
                pathLatLngs = [];
                totalDistance = 0;
                lastTimestamp = null;
                updateStats();
                resetInactivityTimer();

                polyline = L.polyline([], {
                    color: 'var(--btn-color, #2481cc)', weight: 6, opacity: 0.8, lineJoin: 'round', lineCap: 'round'
                }).addTo(map);

                watchId = navigator.geolocation.watchPosition((position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;
                    const timestamp = position.timestamp;

                    resetInactivityTimer();

                    const accuracyLimit = motionMode ? 20 : 60;
                    if (accuracy > accuracyLimit) {
                        if (motionMode) showStatus(`📍 GPS: ${Math.floor(accuracy)}m noaniq`, 2000);
                        else showStatus(`📍 GPS noaniq (${Math.floor(accuracy)}m). Ochiq havoga chiqing!`, 3000);
                        return;
                    }

                    const newPoint = L.latLng(lat, lng);

                    if (pathLatLngs.length > 0) {
                        const lastPoint = pathLatLngs[pathLatLngs.length - 1];
                        const dist = lastPoint.distanceTo(newPoint);

                        // Kichik GPS titrashlari inkor etiladi! Bu tezlik yoki masofaga mutlaqo kirmaydi.
                        if (dist < MIN_DISTANCE_ACCURACY) return;

                        // Faqat haqiqiy uzoq masofa bilan vaqt farqini o'lchaymiz!
                        if (lastTimestamp) {
                            const timeDiffSec = (timestamp - lastTimestamp) / 1000;
                            // Vaqt kamida 0.5 sek o'tgan bo'lishi kerak. Mikro burst bo'linmada tezlikni cheksiz oshirib masofani bekor qilardi.
                            if (timeDiffSec > 0.5) {
                                const speed = dist / timeDiffSec;
                                if (speed > SPEED_LIMIT_MPS) {
                                    showStatus("🚫 Moshinaga o'xshaysiz! (Anti-Cheat)", 2000);
                                    // Izoh: Soxta Tez kelgan nuqtaning vaqtini eslab qolmaymiz! Bu bilan Deadlock dan himoya qilamiz.
                                    return;
                                }
                            } else if (timeDiffSec > 0) {
                                // 0.5 sekundan tez qayta-qayta kelib 2 metrdan ko'p sakrasa, bu baribir glitch sakrash
                                return;
                            }
                        }

                        // HAQIQIY MASOFA Yig'ildi!
                        totalDistance += dist;
                        pathLatLngs.push(newPoint);
                        polyline.addLatLng(newPoint);
                        lastTimestamp = timestamp;

                        if (pathLatLngs.length > 10) {
                            const distanceToStart = newPoint.distanceTo(pathLatLngs[0]);
                            if (distanceToStart <= POLYGON_CLOSE_DIST) {
                                handlePolygonClosure();
                            }
                        }
                    } else {
                        pathLatLngs.push(newPoint);
                        polyline.addLatLng(newPoint);
                        lastTimestamp = timestamp;
                        map.setView(newPoint, 18);
                    }

                    if (!currentPositionMarker) {
                        currentPositionMarker = L.marker([lat, lng], { icon: userIcon, zIndexOffset: 1000 }).addTo(map);
                    } else {
                        currentPositionMarker.setLatLng([lat, lng]);
                    }
                    map.panTo([lat, lng]);

                    // Har doim o'zgarishni ekranga yozamiz
                    updateStats();

                }, (error) => {
                    showStatus("GPS signal kutilmoqda...", 2000);
                    resetInactivityTimer();
                }, { enableHighAccuracy: true, maximumAge: 10000, timeout: 5000 });
            });

            function updateStats() {
                let steps = motionMode ? stepCount : Math.floor(totalDistance / STEP_LENGTH_METERS);
                if (stepCountEl.textContent != steps) {
                    stepCountEl.style.transform = 'scale(1.1)';
                    setTimeout(() => stepCountEl.style.transform = 'scale(1)', 150);
                }
                stepCountEl.textContent = steps;
                distanceEl.textContent = totalDistance < 1000 ? totalDistance.toFixed(1) + ' m' : (totalDistance / 1000).toFixed(2) + ' km';
                let displayArea = totalArea > 10000 ? (totalArea / 10000).toFixed(2) + ' ga' : totalArea.toFixed(1) + ' m²';
                areaEl.textContent = displayArea;
            }

        }); // DOMContentLoaded yopish
    </script>
</body>

</html>
