<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Qadam - Telegram Mini App v2.6</title>

    <!-- Brauzer eski keshni ishlatmasligi uchun -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0c0c0c;
            --surface-color: rgba(255, 255, 255, 0.08);
            --surface-hover: rgba(255, 255, 255, 0.12);
            --primary-gradient: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-color: #00d2ff;
            --danger-color: #ff4d4d;
            --glass-blur: blur(20px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HUD - Top Floating Stats */
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--surface-color);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 24px;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hud-main {
            display: flex;
            flex-direction: column;
        }

        .hud-value {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hud-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .hud-details {
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .hud-detail-item {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .hud-detail-label {
            font-size: 10px;
            color: var(--text-secondary);
            margin-right: 5px;
        }

        /* Map Container */
        #map {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }

        /* Views (Tabs) */
        .view-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2000;
            background: var(--bg-color);
            display: none;
            padding: 80px 20px 100px;
            overflow-y: auto;
        }

        .view-container.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Bottom Nav */
        .bottom-nav {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            z-index: 3000;
            background: var(--surface-color);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 24px;
            height: 70px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-secondary);
            font-size: 10px;
            font-weight: 600;
            gap: 4px;
            transition: all 0.2s;
            cursor: pointer;
            padding: 10px;
        }

        .nav-item.active {
            color: var(--accent-color);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        /* Controls - Start/Stop */
        .action-button-container {
            position: absolute;
            bottom: 100px;
            left: 0;
            width: 100%;
            z-index: 1500;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        .btn-action {
            pointer-events: auto;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-start {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-stop {
            background: var(--danger-color);
            color: white;
            display: none;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.4);
        }

        .btn-action:active {
            transform: scale(0.9);
        }

        /* Leaderboard */
        .rank-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .rank-item {
            background: var(--surface-color);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s;
        }

        .rank-item:active {
            transform: scale(0.98);
        }

        .rank-pos {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-secondary);
            width: 40px;
            text-align: center;
        }

        .rank-info {
            flex-grow: 1;
            margin-left: 10px;
        }

        .rank-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .rank-score {
            font-size: 13px;
            color: var(--accent-color);
            font-weight: 600;
        }

        .rank-top-1 .rank-pos { color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .rank-top-2 .rank-pos { color: #C0C0C0; }
        .rank-top-3 .rank-pos { color: #CD7F32; }
        .is-me { border-color: rgba(0, 210, 255, 0.4); background: rgba(0, 210, 255, 0.1); }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--surface-color);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-card-title {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-card-value {
            font-size: 20px;
            font-weight: 800;
        }

        .status-pill {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }

        .status-pill.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(10px);
        }

        /* Leaflet Overrides */
        .leaflet-container {
            background: #111 !important;
        }
        /* Focus Button */
        #focusBtn:active {
            transform: scale(0.9);
        }
    </style>
</head>

<body>
    <!-- VERSION INDICATOR -->
    <div style="position: absolute; top: 10px; right: 15px; z-index: 9999; font-size: 10px; color: var(--text-secondary); opacity: 0.5; font-weight: bold;">v3.4 Activity Timer</div>

    <!-- GPS SIGNAL INDICATOR -->
    <div id="gpsSignal" style="position: absolute; top: 10px; left: 15px; z-index: 9999; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 12px; backdrop-filter: var(--glass-blur); border: 1px solid rgba(255,255,255,0.1);">
        <div id="gpsDot" style="width: 8px; height: 8px; border-radius: 50%; background-color: gray; box-shadow: 0 0 5px gray;"></div>
        <span id="gpsText" style="color: var(--text-primary);">GPS Kutilmoqda</span>
    </div>

    <!-- MAP VIEW -->
    <div id="map"></div>

    <!-- FOCUS BUTTON -->
    <button id="focusBtn" style="position: absolute; top: 110px; right: 20px; z-index: 1000; background: var(--surface-color); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; width: 45px; height: 45px; backdrop-filter: blur(10px); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s;">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"></path><path d="M17 3h2a2 2 0 0 1 2 2v2"></path><path d="M21 17v2a2 2 0 0 1-2 2h-2"></path><path d="M7 21H5a2 2 0 0 1-2-2v-2"></path><circle cx="12" cy="12" r="3"></circle></svg>

    <div class="hud" id="hud">

            <div style="font-size: 14px; color: var(--accent-color); font-weight: 800; margin-top: 5px; text-shadow: 0 0 10px rgba(0,210,255,0.4);" id="hudTimer">00:00:00</div>

    <!-- STATUS PILL -->

    <!-- ACTION BUTTON -->
    <div class="action-button-container">

            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>

    <!-- STATS VIEW -->
    <div class="view-container" id="viewStats">

                <div class="stat-card-title">Umumiy Bosib Olingan Maydon</div>

    <!-- LEADERBOARD VIEW -->
    <div class="view-container" id="viewRank">
        <h2 style="margin-bottom: 20px; font-weight: 800; font-size: 28px;">Eng Kuchlilar</h2>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <div class="nav-item active" data-view="map">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line></svg>

        </div>

            Reyting
        </div>

    <!-- MAIN SCRIPT -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const tg = window.Telegram?.WebApp || {
                expand: () => { },
                ready: () => { },
                colorScheme: 'dark',
                initDataUnsafe: {},
                showAlert: (msg) => alert(msg),
                showPopup: (opts) => alert(opts.message),
                HapticFeedback: { notificationOccurred: () => {} }
            };
            tg.expand();
            tg.ready();

            const tgUser = tg.initDataUnsafe?.user || { id: 111111, first_name: "Mehmon", username: "mehmon" };
            document.body.setAttribute('data-theme', 'dark');

            const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([41.311081, 69.240562], 13);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CartoDB',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);

            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const stepCountEl = document.getElementById('hudSteps');
            const distanceEl = document.getElementById('distanceDisplay');
            const areaEl = document.getElementById('areaDisplay');
            const statusPill = document.getElementById('statusPill');
            const hud = document.getElementById('hud');

            const navItems = document.querySelectorAll('.nav-item');
            const viewStats = document.getElementById('viewStats');
            const viewRank = document.getElementById('viewRank');

            let isTracking = false;
            let watchId = null;
            let pathLatLngs = [];
            let totalDistance = 0;
            let totalArea = 0;
            let polyline = null;
            let currentPositionMarker = null;
            let polygons = [];
            let allTerritoriesData = [];

            let lastTimestamp = null;
            let inactivityTimer = null;
            
            let trackingStartTime = null;
            let trackingTimerInterval = null;

            let stepCount = 0;
            let accHistory = [];
            const ACC_HISTORY_SIZE = 12;
            const STEP_THRESHOLD = 3.2; 
            let potentialSteps = 0;
            let lastPotentialStepTime = 0;
            
            let motionMode = false;

            const INACTIVITY_LIMIT_MS = 10 * 60 * 1000;
            const SPEED_LIMIT_MPS = 4.0; 
            const POLYGON_CLOSE_DIST = 15;
            const STEP_LENGTH_METERS = 0.6;

            function getUserColor(userId) {
                if (userId === tgUser.id) return '#00d2ff';
                const hue = (userId % 360);
                return `hsl(${hue}, 70%, 60%)`;
            }

            function getLeague(area) {
                if (area < 500) return "🚶 Kichik Qadam";
                if (area < 2000) return "🏃 Sayyoh";
                if (area < 10000) return "🛡 Jengchi";
                if (area < 50000) return "⚔️ Sarkarda";
                return "👑 Imperator";
            }

            const userIcon = L.divIcon({
                className: 'custom-user-marker',
                html: `<div style="width: 20px; height: 20px; background: var(--primary-gradient); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px rgba(0,210,255,0.6); position: relative;">
                         <div style="position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px; border-radius: 50%; background: rgba(0,210,255,0.2); animation: pulse 2s infinite;"></div>
                       </div>
                       <style>
                         @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }
                       </style>`,
                iconSize: [30, 30], iconAnchor: [15, 15]
            });

            function showStatus(msg, timeout = 3000) {
                statusPill.textContent = msg;
                statusPill.classList.add('visible');
                setTimeout(() => statusPill.classList.remove('visible'), timeout);
            }

            let supabase = null;
            try {
                if (window.supabase) {
                    const SUPABASE_URL = 'https://qxncsdivkowkgydtjokr.supabase.co';
                    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4bmNzZGl2a293a2d5ZHRqb2tyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MTAwOTYsImV4cCI6MjA5MDQ4NjA5Nn0.NtAgZcAlQgvsMSMe325n0AW8-Cmz31KD-OGJUFmvhGo';
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                }
            } catch (err) { console.error(err); }

            async function initGameSystem() {
                if (!supabase) return;
                try {
                    await supabase.from('users').upsert({
                        telegram_id: tgUser.id,
                        first_name: tgUser.first_name || '',
                        username: tgUser.username || ''
                    }, { onConflict: 'telegram_id' });

                    await loadAllTerritories();
                    await loadUserStats();

                    supabase.channel('public:territories').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'territories' }, payload => {
                        const newTerritory = payload.new;
                        if (newTerritory.user_id !== tgUser.id) {
                            drawTerritoryPolygon(newTerritory.polygon_coords, newTerritory.user_id);
                        }
                    }).subscribe();
                } catch (e) { console.error(e); }
            }

            async function loadUserStats() {
                if (!supabase) return;
                try {
                    const today = new Date();
                    today.setHours(0,0,0,0);
                    
                    const { data: stepData } = await supabase.from('steps_stats')
                        .select('steps')
                        .eq('user_id', tgUser.id)
                        .gte('date', today.toISOString());

                    const todaySteps = (stepData || []).reduce((acc, row) => acc + row.steps, 0);
                    document.getElementById('statsToday').textContent = todaySteps.toLocaleString();

                    const { data: areaData } = await supabase.from('territories')
                        .select('area_sqm')
                        .eq('user_id', tgUser.id);
                    
                    const totalAreaSqm = (areaData || []).reduce((acc, row) => acc + (row.area_sqm || 0), 0);
                    document.getElementById('statsTotalArea').textContent = totalAreaSqm > 10000 ? (totalAreaSqm/10000).toFixed(2) + ' ha' : totalAreaSqm.toFixed(1) + ' m²';
                    document.getElementById('ligaDisplay').textContent = getLeague(totalAreaSqm);
                } catch (e) { console.error(e); }
            }

            async function loadAllTerritories() {
                if (!supabase) return;
                try {
                    const { data } = await supabase.from('territories').select('*');
                    if (data) {
                        allTerritoriesData = data;
                        let myArea = 0;
                        data.forEach(territory => {
                            drawTerritoryPolygon(territory.polygon_coords, territory.user_id);
                            if (territory.user_id === tgUser.id) myArea += (territory.area_sqm || 0);
                        });
                        totalArea = myArea;
                        updateStats();
                    }
                } catch (e) { }
            }

            function drawTerritoryPolygon(coords, ownerId) {
                if (!coords || coords.length === 0) return;
                const latLngs = coords.map(c => [c.lat, c.lng]);
                const isMine = ownerId === tgUser.id;
                const color = getUserColor(ownerId);

                const poly = L.polygon(latLngs, {
                    color: color,
                    fillColor: color,
                    fillOpacity: isMine ? 0.3 : 0.2,
                    weight: 3,
                    dashArray: isMine ? '' : '5, 10',
                    isMine: isMine
                }).addTo(map);
                polygons.push(poly);
            }

            function getGeodesicArea(latLngs) {
                let area = 0;
                const d2r = Math.PI / 180;
                if (latLngs.length > 2) {
                    for (let i = 0; i < latLngs.length; i++) {
                        let p1 = latLngs[i];
                        let p2 = latLngs[(i + 1) % latLngs.length];
                        area += ((p2.lng - p1.lng) * d2r) * (2 + Math.sin(p1.lat * d2r) + Math.sin(p2.lat * d2r));
                    }
                    area = area * 6378137.0 * 6378137.0 / 2.0;
                }
                return Math.abs(area);
            }

            function resetInactivityTimer() {
                if (inactivityTimer) clearTimeout(inactivityTimer);
                inactivityTimer = setTimeout(() => {
                    if (isTracking) stopTracking(true);
                }, INACTIVITY_LIMIT_MS);
            }

            async function handlePolygonClosure() {
                const area = getGeodesicArea(pathLatLngs);
                totalArea += area;
                const jsonCoords = pathLatLngs.map(p => ({ lat: p.lat, lng: p.lng }));

                drawTerritoryPolygon(jsonCoords, tgUser.id);
                if (supabase) {
                    await supabase.from('territories').insert({
                        user_id: tgUser.id,
                        polygon_coords: jsonCoords,
                        area_sqm: area
                    });
                }

                tg.HapticFeedback.notificationOccurred('success');
                showStatus(`Hudud egallandi: ${area.toFixed(1)} m²`, 4000);

                if (polyline) map.removeLayer(polyline);
                pathLatLngs = [];
                polyline = L.polyline([], { color: '#00d2ff', weight: 6, opacity: 0.8 }).addTo(map);
                updateStats();
                loadUserStats(); 
            }

            function handleMotion(event) {
                if (!isTracking) return;
                const acc = event.accelerationIncludingGravity;
                if (!acc || acc.x === null) return;
                
                const magnitude = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                accHistory.push(magnitude);
                if (accHistory.length > ACC_HISTORY_SIZE) accHistory.shift();
                
                const avgMagnitude = accHistory.reduce((a, b) => a + b, 0) / accHistory.length;
                const delta = Math.abs(magnitude - avgMagnitude);
                const now = Date.now();
                
                if (delta > STEP_THRESHOLD && (now - lastPotentialStepTime) > 300) {
                    if (now - lastPotentialStepTime < 1500) {
                        potentialSteps++;
                    } else {
                        potentialSteps = 1;
                    }
                    lastPotentialStepTime = now;

                    if (potentialSteps >= 4) {
                        if (potentialSteps === 4) stepCount += 4;
                        else stepCount++;
                        updateStats();
                        resetInactivityTimer();
                    }
                }
            }

            function stopTracking(dueToInactivity = false) {
                isTracking = false;
                if (watchId) navigator.geolocation.clearWatch(watchId);
                window.removeEventListener('devicemotion', handleMotion);
                if (inactivityTimer) clearTimeout(inactivityTimer);
                if (trackingTimerInterval) clearInterval(trackingTimerInterval);

                startBtn.style.display = 'flex';
                stopBtn.style.display = 'none';

                if (supabase && stepCount > 0) {
                    supabase.from('steps_stats').insert({
                        user_id: tgUser.id,
                        steps: stepCount,
                        distance_meters: totalDistance,
                        date: new Date().toISOString()
                    }).then(() => loadUserStats());
                }

                if (dueToInactivity) tg.showAlert("10 daqiqa harakatsiz bo'lganligi sababli o'yin to'xtatildi.");
                else tg.HapticFeedback.notificationOccurred('success');

                if (polyline) map.removeLayer(polyline);
                pathLatLngs = [];
                stepCount = 0;
            }

            function updateStats() {
                stepCountEl.textContent = stepCount.toLocaleString();
                distanceEl.textContent = totalDistance < 1000 ? totalDistance.toFixed(1) + ' m' : (totalDistance / 1000).toFixed(2) + ' km';
                areaEl.textContent = totalArea > 10000 ? (totalArea / 10000).toFixed(2) + ' ha' : totalArea.toFixed(1) + ' m²';
            }

            function formatTime(ms) {
                const totalSec = Math.floor(ms / 1000);
                const h = Math.floor(totalSec / 3600);
                const m = Math.floor((totalSec % 3600) / 60);
                const s = totalSec % 60;
                return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }

            document.getElementById('focusBtn').addEventListener('click', () => {
                let myPolygons = polygons.filter(p => p.options.isMine);
                if (myPolygons.length > 0) {
                    let group = new L.featureGroup(myPolygons);
                    map.fitBounds(group.getBounds(), { padding: [30, 30], maxZoom: 18 });
                } else if (currentPositionMarker) {
                    map.panTo(currentPositionMarker.getLatLng(), {animate: true});
                }
            });

            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    navItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    const view = item.getAttribute('data-view');
                    viewStats.classList.toggle('active', view === 'stats');
                    viewRank.classList.toggle('active', view === 'rank');
                    if (view === 'rank') loadLeaderboard();
                });
            });

            async function loadLeaderboard() {
                if (!supabase) return;
                const rankContainer = document.getElementById('rankList');
                rankContainer.innerHTML = '<div style="text-align:center; padding: 20px; color: var(--text-secondary);">Yuklanmoqda...</div>';
                try {
                    const { data: territories } = await supabase.from('territories').select('user_id, area_sqm');
                    const { data: users } = await supabase.from('users').select('*');
                    let userAreas = {};
                    territories?.forEach(t => { userAreas[t.user_id] = (userAreas[t.user_id] || 0) + (t.area_sqm || 0); });
                    let leaderboard = users?.filter(u => userAreas[u.telegram_id] > 0).map(u => ({
                        id: u.telegram_id, name: u.first_name || 'Nomsiz', area: userAreas[u.telegram_id]
                    })).sort((a, b) => b.area - a.area);
                    
                    rankContainer.innerHTML = '';
                    leaderboard?.slice(0, 15).forEach((u, index) => {
                        let rankClass = index === 0 ? 'rank-top-1' : (index === 1 ? 'rank-top-2' : (index === 2 ? 'rank-top-3' : ''));
                        rankContainer.innerHTML += `
                            <div class="rank-item ${rankClass} ${u.id === tgUser.id ? 'is-me' : ''}">
                                <div class="rank-pos">${index + 1}</div>
                                <div class="rank-info">
                                    <div class="rank-name">${u.name}</div>
                                    <div class="rank-score">${u.area > 10000 ? (u.area/10000).toFixed(2) + ' ha' : u.area.toFixed(1) + ' m²'}</div>
                                </div>
                            </div>
                        `;
                    });
                } catch (e) { console.error(e); }
            }

            startBtn.addEventListener('click', async () => {
                if (!("geolocation" in navigator)) return tg.showAlert("GPS yo'q.");
                
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    try {
                        const state = await DeviceMotionEvent.requestPermission();
                        if (state === 'granted') { window.addEventListener('devicemotion', handleMotion); motionMode = true; }
                    } catch (e) { console.error(e); }
                } else { window.addEventListener('devicemotion', handleMotion); motionMode = true; }

                isTracking = true;
                stepCount = 0;
                potentialSteps = 0;
                startBtn.style.display = 'none';
                stopBtn.style.display = 'flex';
                document.getElementById('gpsSignal').style.display = 'flex';
                document.getElementById('hud').classList.add('active');
                
                // Timer
                trackingStartTime = Date.now();
                document.getElementById('hudTimer').textContent = "00:00:00";
                trackingTimerInterval = setInterval(() => {
                    const elapsed = Date.now() - trackingStartTime;
                    document.getElementById('hudTimer').textContent = formatTime(elapsed);
                }, 1000);

                showStatus(motionMode ? "📱 Sensor faol" : "🛰 GPS faol", 2000);

                if (polyline) map.removeLayer(polyline);
                pathLatLngs = [];
                totalDistance = 0;
                lastTimestamp = null;
                updateStats();
                resetInactivityTimer();

                polyline = L.polyline([], { color: '#00d2ff', weight: 6, opacity: 0.8 }).addTo(map);

                watchId = navigator.geolocation.watchPosition((position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;
                    const timestamp = position.timestamp;

                    // Update GPS Indicator
                    const gpsDot = document.getElementById('gpsDot');
                    const gpsText = document.getElementById('gpsText');
                    
                    if (accuracy <= 10) {
                        gpsDot.style.backgroundColor = '#00FF00'; gpsDot.style.boxShadow = '0 0 8px #00FF00';
                        gpsText.textContent = `A'lo (${Math.floor(accuracy)}m)`;
                    } else if (accuracy <= 25) {
                        gpsDot.style.backgroundColor = '#FFD700'; gpsDot.style.boxShadow = '0 0 8px #FFD700';
                        gpsText.textContent = `O'rtacha (${Math.floor(accuracy)}m)`;
                    } else {
                        gpsDot.style.backgroundColor = '#FF4500'; gpsDot.style.boxShadow = '0 0 8px #FF4500';
                        gpsText.textContent = `Zaif ${Math.floor(accuracy)}m`;
                    }

                    resetInactivityTimer();
                    
                    // ANTI-DRIFT 0: Katta adashishda hech narsani qabul qilmaymiz
                    if (accuracy > (motionMode ? 35 : 60)) return;

                    const newPoint = L.latLng(lat, lng);
                    if (pathLatLngs.length > 0) {
                        const lastPoint = pathLatLngs[pathLatLngs.length - 1];
                        const dist = lastPoint.distanceTo(newPoint);
                        
                        // ANTI-DRIFT 1: Kichik adashishlarni (GPS sakrashini) e'tiborga olmaslik
                        let dynamicAccuracyFilter = Math.max(2.5, accuracy * 0.4);
                        if (dist < dynamicAccuracyFilter) return; 

                        if (lastTimestamp) {
                            const timeDiffSec = (timestamp - lastTimestamp) / 1000;
                            
                            // ANTI-DRIFT 2: Tezlik va sakrashni tekshirish
                            if (timeDiffSec > 0) {
                                const speed = dist / timeDiffSec;
                                if (speed > SPEED_LIMIT_MPS) {
                                    showStatus("🚫 Tezlik yuqori!", 2000);
                                    return; // Ghost jump (binoda GPS sakrashi)
                                }
                                
                                // O'ta sekin harakatlanish - bu oddiygina Drift bo'lishi mumkin! Uni masofaga kiritmaymiz.
                                if (speed < 0.2) {
                                    return; 
                                }
                            }
                        }

                        totalDistance += dist;
                        pathLatLngs.push(newPoint);
                        polyline.addLatLng(newPoint);
                        lastTimestamp = timestamp;

                        if (pathLatLngs.length > 10 && newPoint.distanceTo(pathLatLngs[0]) <= POLYGON_CLOSE_DIST) {
                            handlePolygonClosure();
                        }
                    } else {
                        pathLatLngs.push(newPoint);
                        polyline.addLatLng(newPoint);
                        lastTimestamp = timestamp;
                    }

                    // Tizim aniq qadamni qo'shganida marker siljishi
                    if (!currentPositionMarker) {
                        currentPositionMarker = L.marker([lat, lng], { icon: userIcon }).addTo(map);
                    } else {
                        currentPositionMarker.setLatLng([lat, lng]);
                    }
                    map.panTo([lat, lng]);
                    updateStats();
                }, null, { enableHighAccuracy: true });
            });

            stopBtn.addEventListener('click', () => stopTracking());
            initGameSystem();
        });
    </script>
