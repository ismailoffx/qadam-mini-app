<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Qadam - Telegram Mini App</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --btn-color: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --danger-color: #ff3b30;
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            user-select: none; -webkit-user-select: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .hud {
            position: absolute;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            min-width: 220px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        
        [data-theme="dark"] .hud {
            background: rgba(30, 30, 30, 0.85);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.1);
        }

        .hud-value {
            font-size: 38px;
            font-weight: 800;
            background: linear-gradient(135deg, #00C6FF, #0072FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2px;
            line-height: 1.1;
        }
        
        [data-theme="dark"] .hud-value {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hud-label {
            font-size: 13px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--hint-color);
        }

        .hud-stats {
            display: flex; justify-content: space-between;
            margin-top: 10px; font-size: 13px; font-weight: 600;
            border-top: 1px solid rgba(150, 150, 150, 0.3);
            padding-top: 8px;
            gap: 10px;
        }

        #map { flex-grow: 1; width: 100%; z-index: 1; }

        .controls {
            position: absolute; bottom: 30px; left: 0;
            width: 100%; z-index: 1000;
            display: flex; justify-content: center; gap: 15px; padding: 0 20px;
        }

        .btn {
            flex: 1; max-width: 250px; padding: 16px 24px;
            font-size: 18px; font-weight: 600;
            border: none; border-radius: 100px;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn:active { transform: scale(0.95); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1); }
        .btn-start { background-color: var(--btn-color); color: var(--btn-text); }
        .btn-stop { background-color: var(--danger-color); color: white; display: none; }
        
        .status-pill {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0, 0, 0, 0.65); color: white;
            padding: 8px 20px; border-radius: 30px; font-size: 13px; font-weight: 600;
            backdrop-filter: blur(5px); opacity: 0; transition: opacity 0.3s;
            pointer-events: none; white-space: nowrap;
        }
        .status-pill.visible { opacity: 1; }
    </style>
</head>
<body>

    <div class="hud">
        <div class="hud-value" id="stepCount">0</div>
        <div class="hud-label">Qadam</div>
        <div class="hud-stats">
            <span id="distanceDisplay">0.0 m</span>
            <span id="areaDisplay">0 m²</span>
        </div>
    </div>

    <div id="map"></div>
    <div class="status-pill" id="statusPill">GPS kutilyapti...</div>

    <div class="controls">
        <button class="btn btn-start" id="startBtn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            Boshlash
        </button>
        <button class="btn btn-stop" id="stopBtn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"></rect></svg>
            To'xtatish
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        if (tg.colorScheme === 'dark') document.body.setAttribute('data-theme', 'dark');

        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([41.311081, 69.240562], 13);
        L.control.attribution({position: 'bottomright'}).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 19, attribution: '© OSMap'}).addTo(map);

        // State variables
        let isTracking = false;
        let watchId = null;
        let pathLatLngs = [];
        let totalDistance = 0; 
        let totalArea = 0;
        let polyline = null;
        let currentPositionMarker = null;
        let polygons = [];
        
        // Tracking limits & timers
        let lastTimestamp = null;
        let inactivityTimer = null;
        const INACTIVITY_LIMIT_MS = 10 * 60 * 1000; // 10 minutes
        const SPEED_LIMIT_MPS = 1.94; // 7 km/h in m/s
        const POLYGON_CLOSE_DIST = 15; // meters
        const STEP_LENGTH_METERS = 0.7;
        const MIN_DISTANCE_ACCURACY = 2; // jitter

        // UI
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const stepCountEl = document.getElementById('stepCount');
        const distanceEl = document.getElementById('distanceDisplay');
        const areaEl = document.getElementById('areaDisplay');
        const statusPill = document.getElementById('statusPill');

        const userIcon = L.divIcon({
            className: 'custom-user-marker',
            html: '<div style="width: 18px; height: 18px; background-color: var(--btn-color); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.4);"></div>',
            iconSize: [24, 24], iconAnchor: [12, 12]
        });

        function showStatus(msg, timeout = 3000) {
            statusPill.textContent = msg;
            statusPill.classList.add('visible');
            setTimeout(() => { if(!isTracking || statusPill.textContent !== msg) statusPill.classList.remove('visible'); }, timeout);
        }

        // Spherical polygon area calculation (approx)
        function getGeodesicArea(latLngs) {
            let area = 0;
            const d2r = Math.PI / 180;
            if (latLngs.length > 2) {
                for (let i = 0; i < latLngs.length; i++) {
                    let p1 = latLngs[i];
                    let p2 = latLngs[(i + 1) % latLngs.length];
                    area += ((p2.lng - p1.lng) * d2r) * (2 + Math.sin(p1.lat * d2r) + Math.sin(p2.lat * d2r));
                }
                area = area * 6378137.0 * 6378137.0 / 2.0;
            }
            return Math.abs(area);
        }

        function resetInactivityTimer() {
            if (inactivityTimer) clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                if (isTracking) {
                    stopTracking(true); // Pass flag for inactivity
                }
            }, INACTIVITY_LIMIT_MS);
        }

        function handlePolygonClosure() {
            const area = getGeodesicArea(pathLatLngs);
            totalArea += area;
            
            // Draw polygon
            const newPolygon = L.polygon(pathLatLngs, {
                color: 'var(--btn-color, #2481cc)',
                fillColor: 'var(--btn-color, #2481cc)',
                fillOpacity: 0.4,
                weight: 2
            }).addTo(map);
            polygons.push(newPolygon);

            // Notify User
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            tg.showPopup({
                title: "Hudud egallandi!",
                message: `Siz ${area.toFixed(1)} kv.m maydonni yopdingiz!`,
                buttons: [{type: "close"}]
            });

            // Reset path for new area
            if (polyline) map.removeLayer(polyline);
            pathLatLngs = [];
            polyline = L.polyline([], { color: 'var(--btn-color, #2481cc)', weight: 6, opacity: 0.8, lineJoin: 'round', lineCap: 'round'}).addTo(map);
            updateStats();
        }

        function stopTracking(dueToInactivity = false) {
            isTracking = false;
            startBtn.style.display = 'flex';
            stopBtn.style.display = 'none';
            statusPill.classList.remove('visible');
            if (inactivityTimer) clearTimeout(inactivityTimer);
            
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            
            if (dueToInactivity) {
                tg.showAlert("10 daqiqa harakatsiz bo'lganligi sababli o'yin avtomatik to'xtatildi.");
                if (polyline) map.removeLayer(polyline);
                pathLatLngs = [];
            } else {
                let finalSteps = Math.floor(totalDistance / STEP_LENGTH_METERS);
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                tg.showPopup({
                    title: "O'yin to'xtatildi",
                    message: `Siz ${finalSteps} qadam yurdingiz.\nBosib o'tilgan: ${totalDistance < 1000 ? totalDistance.toFixed(1) + ' m' : (totalDistance / 1000).toFixed(2) + ' km'}\nEgallangan maydon: ${totalArea.toFixed(1)} m²`,
                    buttons: [{type: "close"}]
                });
            }
        }

        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition((pos) => {
                map.setView([pos.coords.latitude, pos.coords.longitude], 16);
                currentPositionMarker = L.marker([pos.coords.latitude, pos.coords.longitude], {icon: userIcon, zIndexOffset: 1000}).addTo(map);
            }, () => {}, { enableHighAccuracy: true });
        }

        startBtn.addEventListener('click', () => {
            if (!("geolocation" in navigator)) {
                tg.showAlert("Qurilmangizda GPS yo'q.");
                return;
            }

            isTracking = true;
            startBtn.style.display = 'none';
            stopBtn.style.display = 'flex';
            showStatus("GPS signali qidirilmoqda...", 5000);

            // Clean previous current track (don't clear polygons)
            if (polyline) map.removeLayer(polyline);
            pathLatLngs = []; 
            totalDistance = 0; 
            // totalArea = 0; // Uncomment if we should reset area each time
            lastTimestamp = null;
            updateStats();
            resetInactivityTimer();

            polyline = L.polyline([], {
                color: 'var(--btn-color, #2481cc)', weight: 6, opacity: 0.8, lineJoin: 'round', lineCap: 'round'
            }).addTo(map);

            watchId = navigator.geolocation.watchPosition((position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const accuracy = position.coords.accuracy;
                const timestamp = position.timestamp;
                
                resetInactivityTimer(); // We got an update, user is active

                if (accuracy > 40) return; 
                statusPill.classList.remove('visible'); 
                
                const newPoint = L.latLng(lat, lng);
                
                if (pathLatLngs.length > 0) {
                    const lastPoint = pathLatLngs[pathLatLngs.length - 1];
                    const dist = lastPoint.distanceTo(newPoint);
                    
                    // Speed Check (Anti-cheat)
                    if (lastTimestamp) {
                        const timeDiffSec = (timestamp - lastTimestamp) / 1000;
                        if (timeDiffSec > 0) {
                            const speed = dist / timeDiffSec;
                            if (speed > SPEED_LIMIT_MPS) {
                                showStatus("Juda tez!", 2000);
                                lastTimestamp = timestamp; // Update timestamp regardless to avoid compounding time
                                return; // Ignore point
                            }
                        }
                    }

                    if (dist > MIN_DISTANCE_ACCURACY) {
                        totalDistance += dist;
                        pathLatLngs.push(newPoint);
                        polyline.addLatLng(newPoint);
                        lastTimestamp = timestamp;
                        
                        // Polygon Closure Check Check
                        // Avval 15 metrdan uzoqqa chiqib ketganini ham hisobga olish kerak (ya'ni darhol yopilmasligi uchun, kamida 5-6 ta nuqta yig'ilsin)
                        if (pathLatLngs.length > 10) {
                            const distanceToStart = newPoint.distanceTo(pathLatLngs[0]);
                            if (distanceToStart <= POLYGON_CLOSE_DIST) {
                                handlePolygonClosure();
                            }
                        }
                    }
                } else {
                    pathLatLngs.push(newPoint);
                    polyline.addLatLng(newPoint);
                    lastTimestamp = timestamp;
                    map.setView(newPoint, 18);
                }

                if (!currentPositionMarker) {
                    currentPositionMarker = L.marker([lat, lng], {icon: userIcon, zIndexOffset: 1000}).addTo(map);
                } else {
                    currentPositionMarker.setLatLng([lat, lng]);
                }
                map.panTo([lat, lng]);
                updateStats();
                
            }, (error) => {
                showStatus("GPS signalida xatolik");
                resetInactivityTimer();
            }, { enableHighAccuracy: true, maximumAge: 10000, timeout: 5000 });
        });

        stopBtn.addEventListener('click', () => stopTracking(false));

        function updateStats() {
            let steps = Math.floor(totalDistance / STEP_LENGTH_METERS);
            if(stepCountEl.textContent != steps) {
                stepCountEl.style.transform = 'scale(1.1)';
                setTimeout(() => stepCountEl.style.transform = 'scale(1)', 150);
            }
            stepCountEl.textContent = steps;
            
            distanceEl.textContent = totalDistance < 1000 ? totalDistance.toFixed(1) + ' m' : (totalDistance / 1000).toFixed(2) + ' km';
            
            let displayArea = totalArea > 10000 ? (totalArea / 10000).toFixed(2) + ' ga' : totalArea.toFixed(1) + ' m²';
            areaEl.textContent = displayArea;
        }
    </script>
</body>
</html>
